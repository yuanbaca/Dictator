<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeskMic Dictation</title>
  <script>
    // Apply saved theme immediately to prevent flash of default theme
    (function() {
      const saved = localStorage.getItem('deskmic-theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
  <style>
    :root {
      --bg: #1a1a2e;
      --bg-card: #16213e;
      --bg-hover: #2a2a4a;
      --text: #eeeeee;
      --text-dim: #999999;
      --text-muted: #555555;
      --accent: #4ecca3;
      --accent-hover: #3db88f;
      --accent-glow: rgba(78,204,163,0.15);
      --danger: #e74c3c;
      --danger-glow: rgba(231,76,60,0.2);
      --warning: #f0a500;
      --border: #333333;
      --progress: #3498db;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    .header {
      padding: 20px 24px 12px;
      text-align: center;
      position: relative;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .header .subtitle {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .settings-btn {
      position: absolute;
      right: 20px;
      top: 18px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .settings-btn:hover {
      color: var(--text);
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }

    .status-dot.loading { background: var(--warning); }
    .status-dot.ready { background: var(--accent); }
    .status-dot.recording { background: var(--danger); animation: pulse 1s infinite; }
    .status-dot.transcribing { background: var(--progress); animation: pulse 0.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .rec-timer {
      font-size: 12px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      margin-left: 8px;
    }

    .rec-timer.warning { color: var(--warning); }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }

    .progress-bar .fill {
      height: 100%;
      width: 0%;
      background: var(--progress);
      border-radius: 3px;
    }

    .progress-bar.done .fill { background: var(--accent); }

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .mic-button {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      background: var(--accent-glow);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      position: relative;
    }

    .mic-button:hover {
      filter: brightness(1.2);
      transform: scale(1.05);
    }

    .mic-button:active,
    .mic-button.recording {
      border-color: var(--danger);
      background: var(--danger-glow);
      transform: scale(0.95);
    }

    .mic-button.recording {
      animation: record-pulse 1.5s infinite;
    }

    @keyframes record-pulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--danger-glow); }
      50% { box-shadow: 0 0 0 20px transparent; }
    }

    .mic-button.disabled {
      opacity: 0.3;
      cursor: not-allowed;
      border-color: var(--text-muted);
    }

    .mic-icon {
      font-size: 48px;
      line-height: 1;
    }

    .mic-hint {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
    }

    .transcript-area {
      width: 100%;
      max-width: 360px;
      min-height: 80px;
      max-height: 160px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      overflow-y: auto;
      user-select: text;
    }

    .transcript-area.empty {
      color: var(--text-muted);
      font-style: italic;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 360px;
    }

    .action-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .action-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-inject {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-inject:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-clear {
      background: var(--border);
      color: var(--text-dim);
      flex: 0.5;
    }

    .btn-clear:hover:not(:disabled) { filter: brightness(1.3); }

    .hint-msg {
      background: var(--accent-glow);
      border: 1px solid var(--accent-glow);
      color: var(--text-dim);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      display: none;
      transition: opacity 0.3s;
    }

    .hint-msg.visible { display: block; }

    .error-msg {
      background: var(--danger-glow);
      border: 1px solid var(--danger-glow);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      width: 100%;
      max-width: 360px;
      display: none;
    }

    .error-msg.visible { display: block; }

    /* Phone connect info bar */
    .info-bar {
      padding: 10px 24px 14px;
      border-top: 1px solid var(--border);
    }

    .phone-connect {
      padding: 12px;
      background: var(--bg-card);
      border-radius: 8px;
      text-align: center;
    }

    .url-option {
      margin: 8px 0;
      padding: 8px;
      background: var(--bg-hover);
      border-radius: 6px;
    }

    .url-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .url-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      word-break: break-all;
    }

    .cert-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      margin-top: 4px;
      vertical-align: middle;
    }
    .cert-badge.tailscale { background: var(--accent); color: var(--bg); }
    .cert-badge.self-signed { background: var(--warning); color: var(--bg); }

    .cert-help {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.4;
    }

    .info-text {
      font-size: 11px;
      margin-top: 4px;
    }

    .info-text.accent { color: var(--accent); }
    .info-text.muted { color: var(--text-muted); }

    /* Settings Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 90%;
      max-width: 380px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .modal-close:hover {
      color: var(--text);
      background: var(--bg-hover);
    }

    .modal-body {
      padding: 16px 20px;
    }

    .setting-group {
      margin-bottom: 16px;
    }

    .setting-group label {
      display: block;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .setting-group select {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .setting-group select option {
      background: var(--bg);
      color: var(--text);
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .setting-row:last-child { margin-bottom: 0; }

    .setting-row label { color: var(--text-dim); }

    .setting-row select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      max-width: 200px;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      background: var(--border);
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: left 0.2s;
    }
    .toggle.on::after { left: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>DeskMic Dictation</h1>
    <div class="subtitle">Speak into your mic, text appears at your cursor</div>
    <button class="settings-btn" id="settingsBtn" title="Settings">&#x22EE;</button>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Starting...</span>
    <span class="rec-timer" id="recTimer"></span>

  <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>

  <div class="main-area">
    <button class="mic-button disabled" id="micBtn" title="Click to record">
      <span class="mic-icon">&#x1F399;</span>
    </button>
    <div class="mic-hint" id="micHint">Loading model...</div>

    <div class="hint-msg" id="hintMsg"></div>
    <div class="error-msg" id="errorMsg"></div>

    <div class="transcript-area empty" id="transcript">
      Transcribed text will appear here
    </div>

    <div class="action-buttons">
      <button class="action-btn btn-inject" id="injectBtn" disabled>
        Insert at Cursor
      </button>
      <button class="action-btn btn-clear" id="clearBtn" disabled>
        Clear
      </button>
    </div>
  </div>

  <div class="info-bar">
    <div class="phone-connect" id="phoneConnect">
      <div style="font-size: 12px; color: var(--text-dim); margin-bottom: 6px;">
        Open on your phone:
      </div>

      <div class="url-option">
        <div class="url-label">Same WiFi (LAN)</div>
        <div class="url-value" id="lanUrl">Loading...</div>
        <span class="cert-badge self-signed">Self-signed</span>
      </div>

      <div class="url-option" id="tailscaleSection" style="display:none;">
        <div class="url-label">Anywhere (Tailscale)</div>
        <div class="url-value" id="tailscaleUrl"></div>
        <span class="cert-badge tailscale">Trusted</span>
      </div>

      <div id="certHelp" class="cert-help"></div>
      <div class="info-text muted" id="phoneStatus">No phone connected</div>
      <div class="info-text muted" id="gpuStatus"></div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" id="closeSettings">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label>Theme</label>
          <select id="themeSelect">
            <optgroup label="Default">
              <option value="deskmic-dark">DeskMic Dark</option>
              <option value="deskmic-light">DeskMic Light</option>
            </optgroup>
            <optgroup label="Mint">
              <option value="mint-dark">Mint Dark</option>
              <option value="mint-light">Mint Light</option>
            </optgroup>
            <optgroup label="Colorful">
              <option value="bubble-gum">Bubble Gum</option>
              <option value="ocean">Ocean</option>
              <option value="sunset">Sunset</option>
              <option value="dracula">Dracula</option>
            </optgroup>
            <optgroup label="Brand Inspired">
              <option value="discord">Discord</option>
              <option value="facebook">Facebook</option>
              <option value="instagram">Instagram</option>
              <option value="youtube">YouTube</option>
              <option value="spotify">Spotify</option>
              <option value="twitter">Twitter / X</option>
              <option value="slack">Slack</option>
              <option value="netflix">Netflix</option>
              <option value="reddit">Reddit</option>
              <option value="twitch">Twitch</option>
            </optgroup>
            <optgroup label="Minimal">
              <option value="snow">Snow</option>
              <option value="midnight">Midnight</option>
            </optgroup>
          </select>
        </div>

        <div class="setting-group">
          <label>Recording hotkey</label>
          <select id="hotkeySelect">
            <option value="Ctrl+Shift+Space">Ctrl + Shift + Space</option>
            <option value="Ctrl+Shift+D">Ctrl + Shift + D</option>
            <option value="Ctrl+Alt+Space">Ctrl + Alt + Space</option>
            <option value="F9">F9</option>
            <option value="Ctrl+F9">Ctrl + F9</option>
            <option value="none">Disabled</option>
          </select>
        </div>

        <div class="setting-group">
          <label>Microphone</label>
          <select id="micDevice">
            <option value="">System default</option>
          </select>
        </div>

        <div class="setting-row">
          <label>Add space after insert</label>
          <div class="toggle on" id="autoSpaceToggle"></div>
        </div>

        <div class="setting-row">
          <label>Start on boot</label>
          <div class="toggle" id="autostartToggle"></div>
        </div>

        <div class="setting-row">
          <label>Sound effects</label>
          <div class="toggle" id="soundToggle"></div>
        </div>

        <div class="setting-group">
          <label>Insertion mode</label>
          <select id="injectionMode">
            <option value="paste" selected>Clipboard paste (fast)</option>
            <option value="type">Simulated typing (compatible)</option>
          </select>
        </div>
      </div>
    </div>
  </div>

        danger: '#f85149', dangerGlow: 'rgba(248,81,73,.15)',

    function applyTheme(id) {
      const t = THEMES[id];
      if (!t) return;
      const s = document.documentElement.style;
      s.setProperty('--bg', t.bg);
      s.setProperty('--bg-card', t.bgCard);
      s.setProperty('--bg-hover', t.bgHover);
      s.setProperty('--text', t.text);
      s.setProperty('--text-dim', t.textDim);
      s.setProperty('--text-muted', t.textMuted);
      s.setProperty('--accent', t.accent);
      s.setProperty('--accent-hover', t.accentHover);
      s.setProperty('--accent-glow', t.accentGlow);
      s.setProperty('--danger', t.danger);
      s.setProperty('--danger-glow', t.dangerGlow);
      s.setProperty('--warning', t.warning);
      s.setProperty('--border', t.border);
      s.setProperty('--progress', t.progress);
      localStorage.setItem('deskmic-theme', id);
      themeSelect.value = id;
    }

    // ── DOM Elements ────────────────────────────────────────────────────
    const micBtn = document.getElementById('micBtn');
    const micHint = document.getElementById('micHint');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const transcript = document.getElementById('transcript');
    const injectBtn = document.getElementById('injectBtn');
    const clearBtn = document.getElementById('clearBtn');
    const hintMsg = document.getElementById('hintMsg');
    const errorMsg = document.getElementById('errorMsg');
    const injectionMode = document.getElementById('injectionMode');
    const autoSpaceToggle = document.getElementById('autoSpaceToggle');
    const themeSelect = document.getElementById('themeSelect');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const recTimerEl = document.getElementById('recTimer');

    let isRecording = false;
    let currentText = '';
    let hotkeyTriggered = false;

    // ── Animated Progress Bar ───────────────────────────────────────────
    let progressAnimFrame = null;
    let progressCurrent = 0;
    let progressTarget = 90;
    let recordingStartTime = null;

    function startAnimatedProgress(audioDurationSec) {
      const estimatedMs = Math.max(audioDurationSec * 500, 2000);
      progressCurrent = 0;
      progressTarget = 70;
      progressBar.classList.remove('done');
      progressFill.style.transition = 'none';
      progressFill.style.width = '0%';
      const startTime = performance.now();
      function animate(now) {
        const elapsed = now - startTime;
        const fraction = Math.min(elapsed / estimatedMs, 1);
        // Slow logarithmic curve — steady crawl, no sudden stall
        const eased = Math.log(1 + fraction * 9) / Math.log(10);
        const pct = eased * progressTarget;
        if (pct > progressCurrent) progressCurrent = pct;
        progressFill.style.width = progressCurrent + '%';
        if (fraction < 1) progressAnimFrame = requestAnimationFrame(animate);
      }
      progressAnimFrame = requestAnimationFrame(animate);
    }

    function onServerProgress(pct) {
      if (pct > progressCurrent) {
        progressCurrent = pct;
        progressFill.style.width = pct + '%';
      }
    }

    function completeProgress() {
      if (progressAnimFrame) { cancelAnimationFrame(progressAnimFrame); progressAnimFrame = null; }
      progressFill.style.transition = 'width 0.3s ease';
      progressFill.style.width = '100%';
      progressBar.classList.add('done');
      setTimeout(() => {
        progressFill.style.width = '0%';
        progressBar.classList.remove('done');
        setTimeout(() => { progressFill.style.transition = 'none'; }, 300);
      }, 800);
    }

    function resetProgress() {
      if (progressAnimFrame) { cancelAnimationFrame(progressAnimFrame); progressAnimFrame = null; }
      progressFill.style.transition = 'width 0.3s ease';
      progressFill.style.width = '0%';
      progressBar.classList.remove('done');
      setTimeout(() => { progressFill.style.transition = 'none'; }, 300);
    }

    // ── Sound Effects (Web Audio API) ──────────────────────────────────
    let soundEnabled = localStorage.getItem('deskmic-sound') === 'true';
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new AudioContext();
      return audioCtx;
    }

    function playTone(freq, startTime, duration, gain) {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const vol = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      vol.gain.setValueAtTime(gain, startTime);
      vol.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
      osc.connect(vol);
      vol.connect(ctx.destination);
      osc.start(startTime);
      osc.stop(startTime + duration);
    }

    function soundRecordStart() {
      if (!soundEnabled) return;
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      playTone(523, now, 0.12, 0.15);       // C5
      playTone(659, now + 0.1, 0.12, 0.15); // E5
    }

    function soundRecordStop() {
      if (!soundEnabled) return;
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      playTone(659, now, 0.12, 0.12);       // E5
      playTone(523, now + 0.1, 0.12, 0.12); // C5
    }

    function soundComplete() {
      if (!soundEnabled) return;
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      playTone(523, now, 0.15, 0.12);        // C5
      playTone(659, now + 0.12, 0.15, 0.12); // E5
      playTone(784, now + 0.24, 0.25, 0.14); // G5
    }

    function soundError() {
      if (!soundEnabled) return;
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      playTone(330, now, 0.3, 0.1); // E4 low soft tone
    }

    // ── Startup ─────────────────────────────────────────────────────────
    async function init() {
      setStatus('loading', 'Loading whisper model...');

      await listen('transcribe-progress', (event) => {
        onServerProgress(event.payload);
      });

      await listen('toggle-recording', () => {
        if (micBtn.classList.contains('disabled')) return;
        hotkeyTriggered = true;
        micBtn.click();
      });

      await listen('model-ready', (event) => {
        if (event.payload === 'ok') {
          setStatus('ready', 'Ready \u2014 click the mic to record');
          micBtn.classList.remove('disabled');
          micHint.textContent = 'Click to start recording';
        } else {
          setStatus('loading', 'Model failed to load');
          showError(event.payload);
        }
      });
    }

    // ── Status ──────────────────────────────────────────────────────────
    function setStatus(state, text) {
      statusDot.className = 'status-dot ' + state;
      statusText.textContent = text;
    }

    function showHint(msg) {
      hintMsg.textContent = msg;
      hintMsg.classList.add('visible');
      setTimeout(() => hintMsg.classList.remove('visible'), 3000);
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
      setTimeout(() => errorMsg.classList.remove('visible'), 5000);
    }

    // ── Recording Timer ─────────────────────────────────────────────────
    let recTimerInterval = null;

    function startRecTimer() {
      const start = Date.now();
      recTimerEl.textContent = '0:00';
      recTimerEl.classList.remove('warning');
      recTimerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - start) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        recTimerEl.textContent = mins + ':' + String(secs).padStart(2, '0');
        if (elapsed >= 120) {
          recTimerEl.classList.add('warning');
          if (elapsed === 120) showHint('Long recording \u2014 longer audio takes longer to process');
        }
      }, 1000);
    }

    function stopRecTimer() {
      if (recTimerInterval) clearInterval(recTimerInterval);
      recTimerInterval = null;
      recTimerEl.textContent = '';
      recTimerEl.classList.remove('warning');
    }

    // ── Recording ───────────────────────────────────────────────────────
    micBtn.addEventListener('click', async () => {
      if (micBtn.classList.contains('disabled')) return;

      if (!isRecording) {
        try {
          await invoke('start_recording');
          isRecording = true;
          soundRecordStart();
          recordingStartTime = Date.now();
          micBtn.classList.add('recording');
          micHint.textContent = 'Recording... click again to stop';
          setStatus('recording', 'Recording...');
          hintMsg.classList.remove('visible');
          errorMsg.classList.remove('visible');
          startRecTimer();
        } catch (e) {
          showError('Failed to start recording: ' + e);
        }
      } else {
        isRecording = false;
        micBtn.classList.remove('recording');
        micBtn.classList.add('disabled');
        micHint.textContent = 'Transcribing...';
        setStatus('transcribing', 'Transcribing...');
        stopRecTimer();
        soundRecordStop();
        const recDurationSec = recordingStartTime ? (Date.now() - recordingStartTime) / 1000 : 3;
        startAnimatedProgress(recDurationSec);

        try {
          const text = await invoke('stop_and_transcribe');
          completeProgress();
          soundComplete();
          currentText = text;
          transcript.textContent = text;
          transcript.classList.remove('empty');
          injectBtn.disabled = false;
          clearBtn.disabled = false;
          setStatus('ready', 'Ready');

          // Auto-inject when triggered by hotkey (user is already in target app)
          if (hotkeyTriggered) {
            hotkeyTriggered = false;
            try {
              await invoke('inject_text', { text });
              micHint.textContent = 'Inserted! Press hotkey to record again';
            } catch (e) {
              micHint.textContent = 'Transcribed (injection failed)';
            }
          } else {
            micHint.textContent = 'Click to record again';
          }
        } catch (e) {
          resetProgress();
          soundError();
          const err = '' + e;
          micHint.textContent = 'Click to start recording';
          setStatus('ready', 'Ready');

          if (err.startsWith('hint:')) {
            showHint(err.substring(5));
          } else {
            showError(err);
          }
        }

        micBtn.classList.remove('disabled');
      }
    });

    // ── Inject ──────────────────────────────────────────────────────────
    injectBtn.addEventListener('click', async () => {
      if (!currentText) return;
      injectBtn.disabled = true;
      injectBtn.textContent = 'Switch to your app now...';

      await new Promise(r => setTimeout(r, 1500));

      try {
        await invoke('inject_text', { text: currentText });
        injectBtn.textContent = 'Inserted!';
        setTimeout(() => {
          injectBtn.textContent = 'Insert at Cursor';
          injectBtn.disabled = false;
        }, 1500);
      } catch (e) {
        showError('Injection failed: ' + e);
        injectBtn.textContent = 'Insert at Cursor';
        injectBtn.disabled = false;
      }
    });

    // ── Clear ───────────────────────────────────────────────────────────
    clearBtn.addEventListener('click', () => {
      currentText = '';
      transcript.textContent = 'Transcribed text will appear here';
      transcript.classList.add('empty');
      injectBtn.disabled = true;
      clearBtn.disabled = true;
    });

    // ── Settings Modal ──────────────────────────────────────────────────
    const settingsOverlay = document.getElementById('settingsOverlay');

    document.getElementById('settingsBtn').addEventListener('click', () => {
      settingsOverlay.classList.add('visible');
    });

    document.getElementById('closeSettings').addEventListener('click', () => {
      settingsOverlay.classList.remove('visible');
    });

    settingsOverlay.addEventListener('click', (e) => {
      if (e.target === settingsOverlay) settingsOverlay.classList.remove('visible');
    });

    // ── Settings Controls ───────────────────────────────────────────────
    const micDevice = document.getElementById('micDevice');

    themeSelect.addEventListener('change', () => {
      applyTheme(themeSelect.value);
    });

    injectionMode.addEventListener('change', async () => {
      await invoke('set_injection_mode', { mode: injectionMode.value });
    });

    autoSpaceToggle.addEventListener('click', async () => {
      const isOn = autoSpaceToggle.classList.toggle('on');
      await invoke('set_auto_space', { enabled: isOn });
    });

    const hotkeySelect = document.getElementById('hotkeySelect');
    hotkeySelect.addEventListener('change', async () => {
      try {
        await invoke('set_hotkey', { preset: hotkeySelect.value });
        localStorage.setItem('deskmic-hotkey', hotkeySelect.value);
      } catch (e) {
        showError('Hotkey failed: ' + e);
      }
    });

    const soundToggle = document.getElementById('soundToggle');
    if (soundEnabled) soundToggle.classList.add('on');
    soundToggle.addEventListener('click', () => {
      soundEnabled = soundToggle.classList.toggle('on');
      localStorage.setItem('deskmic-sound', soundEnabled);
    });

    const autostartToggle = document.getElementById('autostartToggle');
    autostartToggle.addEventListener('click', async () => {
      const isOn = autostartToggle.classList.toggle('on');
      try {
        await invoke('set_autostart', { enabled: isOn });
      } catch (e) {
        autostartToggle.classList.toggle('on'); // revert
        showError('Autostart failed: ' + e);
      }
    });

    micDevice.addEventListener('change', async () => {
      const device = micDevice.value || null;
      await invoke('set_selected_device', { device });
    });

    async function loadAudioDevices() {
      try {
        const devices = await invoke('list_audio_devices');
        const selected = await invoke('get_selected_device');
        for (const name of devices) {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          if (name === selected) opt.selected = true;
          micDevice.appendChild(opt);
        }
      } catch (e) { /* ignore */ }
    }

    // ── Phone Connection Info ───────────────────────────────────────────
    const lanUrlEl = document.getElementById('lanUrl');
    const tailscaleSectionEl = document.getElementById('tailscaleSection');
    const tailscaleUrlEl = document.getElementById('tailscaleUrl');
    const phoneStatusEl = document.getElementById('phoneStatus');
    const certHelp = document.getElementById('certHelp');

    async function loadServerInfo() {
      try {
        const url = await invoke('get_server_url');
        if (url) lanUrlEl.textContent = url;
      } catch (e) {
        lanUrlEl.textContent = 'Not available';
      }

      try {
        const tsUrl = await invoke('get_tailscale_url');
        if (tsUrl) {
          tailscaleUrlEl.textContent = tsUrl;
          tailscaleSectionEl.style.display = '';
          certHelp.innerHTML = 'LAN requires accepting a security warning on your phone. Tailscale works with no warnings.';
        } else {
          certHelp.innerHTML = 'Your phone will show a security warning.<br>Tap <b>Show Details</b> \u2192 <b>visit this website</b> to proceed.';
        }
      } catch (e) {
        certHelp.innerHTML = 'Your phone will show a security warning.<br>Tap <b>Show Details</b> \u2192 <b>visit this website</b> to proceed.';
      }

      try {
        const autoSpace = await invoke('get_auto_space');
        if (autoSpace) {
          autoSpaceToggle.classList.add('on');
        } else {
          autoSpaceToggle.classList.remove('on');
        }
      } catch (e) { /* ignore */ }

      try {
        const gpu = await invoke('get_gpu_status');
        const gpuEl = document.getElementById('gpuStatus');
        if (gpu.active === true) {
          gpuEl.textContent = 'GPU acceleration active';
          gpuEl.className = 'info-text accent';
        } else if (gpu.compiled) {
          gpuEl.textContent = 'GPU compiled but using CPU (no compatible GPU found)';
        } else {
          gpuEl.textContent = 'Running on CPU';
        }
      } catch (e) { /* ignore */ }
    }

    async function pollPhoneStatus() {
      try {
        const count = await invoke('get_connected_phones');
        if (count > 0) {
          phoneStatusEl.textContent = count + ' phone' + (count > 1 ? 's' : '') + ' connected';
          phoneStatusEl.className = 'info-text accent';
        } else {
          phoneStatusEl.textContent = 'No phone connected';
          phoneStatusEl.className = 'info-text muted';
        }
      } catch (e) { /* ignore */ }
    }

    setInterval(pollPhoneStatus, 2000);

    // ── Init ────────────────────────────────────────────────────────────
    async function loadHotkey() {
      const saved = localStorage.getItem('deskmic-hotkey') || 'Ctrl+Shift+Space';
      hotkeySelect.value = saved;
      try {
        await invoke('set_hotkey', { preset: saved });
      } catch (e) { /* ignore */ }
    }

    async function loadAutostartState() {
      try {
        const enabled = await invoke('get_autostart');
        if (enabled) autostartToggle.classList.add('on');
      } catch (e) { /* ignore */ }
    }

    applyTheme(localStorage.getItem('deskmic-theme') || 'deskmic-dark');
    init();
    loadServerInfo();
    loadAudioDevices();
    loadAutostartState();
    loadHotkey();
  </script>
