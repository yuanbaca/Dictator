<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dictator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-user-select: none;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .header {
      padding: 16px;
      text-align: center;
    }

    .header h1 { font-size: 18px; font-weight: 600; }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px;
      font-size: 14px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }

    .status-dot.connecting { background: #f0a500; animation: pulse 1s infinite; }
    .status-dot.connected { background: #4ecca3; }
    .status-dot.recording { background: #e74c3c; animation: pulse 0.8s infinite; }
    .status-dot.listening { background: #e74c3c; animation: pulse 1.2s infinite; }
    .status-dot.transcribing { background: #3498db; animation: pulse 0.5s infinite; }
    .status-dot.error { background: #e74c3c; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: safe center;
      padding: 24px;
      gap: 20px;
    }

    .mic-button {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 4px solid #4ecca3;
      background: rgba(78, 204, 163, 0.1);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .mic-button:active,
    .mic-button.recording {
      border-color: #e74c3c;
      background: rgba(231, 76, 60, 0.2);
      transform: scale(0.92);
    }

    .mic-button.recording {
      animation: record-glow 1.5s infinite;
    }

    @keyframes record-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.5); }
      50% { box-shadow: 0 0 0 24px rgba(231, 76, 60, 0); }
    }

    .mic-button.disabled {
      opacity: 0.3;
      pointer-events: none;
      border-color: #555;
    }

    .mic-icon { font-size: 64px; line-height: 1; }

    .mic-hint {
      font-size: 15px;
      color: #999;
      text-align: center;
      min-height: 40px;
    }

    .transcript-area {
      width: 100%;
      min-height: 60px;
      max-height: 120px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      line-height: 1.5;
      color: #ddd;
      overflow-y: auto;
      text-align: center;
    }

    .transcript-area.empty {
      color: #555;
      font-style: italic;
    }

    .transcript-area.success {
      border-color: #4ecca3;
      color: #4ecca3;
    }

    /* Live-mode transcript grows taller so the running dictation is
       readable while the user keeps speaking. */
    .transcript-area.live {
      max-height: 220px;
      text-align: left;
      border-color: #e74c3c;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 16px;
      right: 16px;
      color: #fff;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 10;
    }

    .toast.visible {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.error { background: rgba(231, 76, 60, 0.9); }
    .toast.hint { background: rgba(100, 100, 120, 0.9); }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: transparent;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      width: 0%;
      background: #3498db;
    }

    .progress-bar.done .fill { background: #4ecca3; }

    .rec-timer {
      font-size: 13px;
      color: #999;
      font-variant-numeric: tabular-nums;
      min-height: 18px;
    }

    .rec-timer.warning { color: #f0a500; }

    .controls-area {
      padding: 0 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .key-buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .key-btn {
      padding: 10px 20px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #16213e;
      color: #ddd;
      font-size: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .key-btn:active { background: #2a2a4a; }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #16213e;
      border-radius: 8px;
      font-size: 13px;
    }

    .setting-row label { color: #999; }

    .setting-row select {
      background: #1a1a2e;
      color: #eee;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      max-width: 160px;
    }

    .setting-hint {
      font-size: 11px;
      color: #666;
      padding: 0 12px;
      margin-top: -6px;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      background: #333;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle.on { background: #4ecca3; }
    .toggle.disabled { opacity: 0.4; cursor: not-allowed; }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: left 0.2s;
    }
    .toggle.on::after { left: 20px; }

    /* Direction A companion pass: same visual language as the desktop UI. */
    :root {
      --bg: #1f232b;
      --bg-card: #282e38;
      --bg-elev: #323944;
      --bg-hover: #3a4350;
      --text: #f1f3f6;
      --text-dim: #b8c0ca;
      --text-muted: #788391;
      --accent: #5fa8ff;
      --accent-hover: #7abbff;
      --accent-ink: #081523;
      --accent-glow: rgba(95,168,255,0.30);
      --danger: #f06a4f;
      --danger-glow: rgba(240,106,79,0.36);
      --warning: #e8bf55;
      --success: #65d39a;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.15);
      --progress: #5fa8ff;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
      --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, monospace;
      --r-sm: 6px;
      --r-md: 8px;
      --r-lg: 12px;
    }

    body {
      font-family: var(--font-sans);
      color: var(--text);
      background:
        radial-gradient(circle at 50% -120px, var(--accent-glow), transparent 330px),
        linear-gradient(180deg, color-mix(in oklab, var(--bg), white 3%), var(--bg) 36%);
      -webkit-font-smoothing: antialiased;
    }

    .header {
      padding: 18px 18px 8px;
    }

    .header h1 {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .header h1::before {
      content: '';
      width: 24px;
      height: 24px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--accent), color-mix(in oklab, var(--accent), white 24%));
      box-shadow: 0 8px 22px var(--accent-glow);
    }

    .status-bar {
      width: fit-content;
      max-width: calc(100% - 32px);
      margin: 0 auto;
      padding: 6px 11px 6px 9px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--bg-elev);
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      box-shadow: 0 0 0 3px color-mix(in oklab, currentColor 14%, transparent);
    }

    .status-dot.connecting { background: var(--warning); color: var(--warning); }
    .status-dot.connected { background: var(--success); color: var(--success); }
    .status-dot.recording,
    .status-dot.listening,
    .status-dot.error { background: var(--danger); color: var(--danger); }
    .status-dot.transcribing { background: var(--accent); color: var(--accent); }

    .main-area {
      justify-content: center;
      gap: 16px;
      padding: 22px 24px 18px;
    }

    .mic-button {
      width: 184px;
      height: 184px;
      border: 0;
      background: transparent;
      isolation: isolate;
      position: relative;
      filter: none;
      transition: transform 0.16s ease;
    }

    .mic-button::before,
    .mic-button::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
    }

    .mic-button::before {
      inset: -16px;
      z-index: -2;
      background: radial-gradient(circle, var(--accent-glow), transparent 68%);
      filter: blur(9px);
      animation: companion-ambient 3.4s ease-in-out infinite;
    }

    .mic-button::after {
      z-index: -1;
      border: 1.5px solid var(--accent);
      opacity: 0.44;
    }

    .mic-button:active {
      transform: scale(0.97);
    }

    .mic-button.recording::before {
      background: radial-gradient(circle, var(--danger-glow), transparent 68%);
      animation: companion-rec-pulse 1.2s ease-in-out infinite;
    }

    .mic-button.recording::after {
      border-color: var(--danger);
      border-top-color: transparent;
      border-right-color: var(--danger);
      opacity: 0.86;
      animation: companion-rec-ring 1.7s linear infinite;
    }

    .mic-button.disabled {
      opacity: 0.56;
      border-color: transparent;
    }

    .mic-core {
      width: 146px;
      height: 146px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 1;
      background: radial-gradient(circle at 32% 24%, color-mix(in oklab, var(--accent), white 22%), var(--accent));
      color: var(--accent-ink);
      box-shadow:
        0 22px 50px var(--accent-glow),
        inset 0 2px 5px rgba(255,255,255,0.28),
        inset 0 -5px 14px rgba(0,0,0,0.26);
    }

    .mic-button.recording .mic-core {
      background: radial-gradient(circle at 32% 24%, color-mix(in oklab, var(--danger), white 22%), var(--danger));
      box-shadow:
        0 22px 50px var(--danger-glow),
        inset 0 2px 5px rgba(255,255,255,0.22),
        inset 0 -5px 14px rgba(0,0,0,0.28);
    }

    .mic-icon {
      width: 62px;
      height: 62px;
      color: currentColor;
      font-size: 0;
    }

    .rec-timer {
      min-height: 19px;
      font-family: var(--font-mono);
      color: var(--text-dim);
      letter-spacing: 0;
    }

    .mic-hint {
      color: var(--text-dim);
      font-size: 14px;
      font-weight: 550;
      line-height: 1.35;
    }

    .transcript-area {
      min-height: 92px;
      max-height: 160px;
      padding: 32px 14px 14px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: color-mix(in oklab, var(--bg-card) 92%, black 8%);
      color: var(--text);
      text-align: left;
      position: relative;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .transcript-area::before {
      content: 'Transcript';
      position: absolute;
      top: 11px;
      left: 14px;
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 750;
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }

    .transcript-area.empty {
      color: var(--text-muted);
    }

    .transcript-area.success {
      border-color: color-mix(in oklab, var(--success) 60%, var(--border));
      color: var(--text);
      box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--success) 24%, transparent);
    }

    .transcript-area.live {
      border-color: color-mix(in oklab, var(--danger) 60%, var(--border));
    }

    .transcript-area.live::before {
      content: 'Live preview';
      color: var(--danger);
    }

    .progress-bar .fill {
      background: linear-gradient(90deg, var(--accent), var(--progress));
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .progress-bar.done .fill {
      background: var(--success);
    }

    .controls-area {
      padding: 0 18px 18px;
      gap: 9px;
    }

    .key-buttons {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .key-btn,
    .setting-row,
    .setting-row select {
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      border-radius: var(--r-md);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .key-btn {
      padding: 11px 8px;
      font-size: 12px;
      font-weight: 650;
      min-width: 0;
    }

    #readAloudBtn {
      border-color: color-mix(in oklab, var(--accent) 60%, var(--border)) !important;
      color: var(--accent) !important;
      background: color-mix(in oklab, var(--accent) 9%, var(--bg-card));
    }

    .setting-row {
      padding: 11px 12px;
      font-size: 12.5px;
      gap: 12px;
    }

    .setting-row label {
      color: var(--text-dim);
      font-weight: 600;
    }

    .setting-row select {
      background: var(--bg-elev);
      color: var(--text);
      max-width: 160px;
    }

    .setting-hint {
      color: var(--text-muted);
      line-height: 1.45;
    }

    .toggle {
      width: 34px;
      height: 20px;
      border-radius: 999px;
      padding: 2px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
    }

    .toggle::after {
      top: 3px;
      left: 3px;
      width: 12px;
      height: 12px;
      background: var(--text-dim);
    }

    .toggle.on {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .toggle.on::after {
      left: 17px;
      background: var(--accent-ink);
    }

    .toast {
      left: 18px;
      right: 18px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--bg-card);
      box-shadow: 0 18px 44px rgba(0,0,0,0.35);
    }

    .toast.error {
      border-color: var(--danger);
      background: color-mix(in oklab, var(--danger) 15%, var(--bg-card));
    }

    .toast.hint {
      border-color: color-mix(in oklab, var(--accent) 45%, var(--border));
      background: color-mix(in oklab, var(--accent) 13%, var(--bg-card));
    }

    @keyframes companion-ambient {
      0%, 100% { opacity: 0.62; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.04); }
    }

    @keyframes companion-rec-pulse {
      0%, 100% { opacity: 0.84; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    @keyframes companion-rec-ring {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Dictator</h1>
  </div>

  <div class="status-bar">
    <div class="status-dot connecting" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>

  <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>

  <div class="main-area">
    <button class="mic-button disabled" id="micBtn">
      <span class="mic-core">
        <svg class="mic-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="9" y="3" width="6" height="12" rx="3" fill="currentColor"></rect>
          <path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
        </svg>
      </span>
    </button>
    <div class="rec-timer" id="recTimer"></div>
    <div class="mic-hint" id="micHint">Connecting to desktop...</div>

    <div class="transcript-area empty" id="transcript">
      Speak and your words will appear on your PC
    </div>
  </div>

  <div class="controls-area">
    <div class="key-buttons">
      <button class="key-btn" id="enterBtn">Enter ↵</button>
      <button class="key-btn" id="tabBtn">Tab ⇥</button>
      <button class="key-btn" id="backspaceBtn">⌫</button>
      <button class="key-btn" id="readAloudBtn" style="border-color:#4ecca3; color:#4ecca3;">Read Aloud</button>
    </div>
    <div class="setting-row">
      <label>Add space after insert</label>
      <div class="toggle on" id="autoSpaceToggle"></div>
    </div>
    <div class="setting-row">
      <label>Live mode (continuous)</label>
      <div class="toggle" id="liveModeToggle"></div>
    </div>
    <div class="setting-hint" id="liveModeHint">
      Streams audio continuously; auto-splits on pauses. Beta — quality varies.
    </div>
    <div class="setting-row">
      <label>Auto-format with AI</label>
      <div class="toggle" id="autoFormatToggle"></div>
    </div>
    <div id="autoFormatExtra" style="display:none;">
      <div class="setting-hint">Adds 5-15 sec processing time</div>
      <div class="setting-row" style="margin-top:6px;">
        <label>Format style</label>
        <select id="autoFormatType">
          <option value="clean_up">Clean up</option>
          <option value="email">Email</option>
          <option value="meeting_notes">Meeting notes</option>
          <option value="documentation">Documentation</option>
          <option value="message">Message</option>
        </select>
      </div>
    </div>
  </div>

  <div class="toast" id="toastMsg"></div>

  <script>
    const micBtn = document.getElementById('micBtn');
    const micHint = document.getElementById('micHint');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const transcript = document.getElementById('transcript');
    const toastMsg = document.getElementById('toastMsg');

    let ws = null;
    let isRecording = false;
    let audioContext = null;
    let mediaStream = null;
    let recorder = null; // ScriptProcessorNode
    let recordedSamples = [];
    let recStartTime = null;
    let recTimerInterval = null;
    const recTimerEl = document.getElementById('recTimer');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');

    // --- Live mode state ---
    // Live mode streams audio continuously and the server runs VAD +
    // Whisper per utterance. Segments stream back via `live_segment`
    // and accumulate in `liveSegments` so the transcript shows the
    // running dictation without flicker.
    let liveMode = false;          // setting toggle (sticky)
    let liveActive = false;        // currently in a live session
    let liveSegments = [];         // strings, joined for display
    let liveAwaitingEnd = false;   // stop requested, waiting for live_ended

    function isLiveModeOn() {
      return document.getElementById('liveModeToggle').classList.contains('on');
    }

    // --- Animated progress bar ---
    // Two-phase: Whisper transcription fills to ~50% (or ~90% without LLM),
    // then LLM formatting fills from ~50% to ~90%. completeProgress() finishes to 100%.
    let progressAnimFrame = null;
    let progressCurrent = 0;
    let progressTarget = 90;
    let lastAudioDurationSec = 0;

    function isAutoFormatOn() {
      return document.getElementById('autoFormatToggle').classList.contains('on');
    }

    function startAnimatedProgress(audioDurationSec) {
      const estimatedMs = Math.max(audioDurationSec * 300, 1500);
      progressCurrent = 0;
      progressTarget = isAutoFormatOn() ? 45 : 90;
      progressBar.classList.remove('done');
      progressFill.style.transition = 'none';
      progressFill.style.width = '0%';
      const startTime = performance.now();
      function animate(now) {
        const elapsed = now - startTime;
        const fraction = Math.min(elapsed / estimatedMs, 1);
        const eased = 1 - Math.pow(1 - fraction, 3);
        const pct = eased * progressTarget;
        if (pct > progressCurrent) progressCurrent = pct;
        progressFill.style.width = progressCurrent + '%';
        if (fraction < 1) progressAnimFrame = requestAnimationFrame(animate);
      }
      progressAnimFrame = requestAnimationFrame(animate);
    }

    function startFormattingProgress() {
      if (progressAnimFrame) { cancelAnimationFrame(progressAnimFrame); progressAnimFrame = null; }
      const fromPct = progressCurrent;
      progressTarget = 90;
      const estimatedMs = 8000;
      const startTime = performance.now();
      function animate(now) {
        const elapsed = now - startTime;
        const fraction = Math.min(elapsed / estimatedMs, 1);
        const eased = 1 - Math.pow(1 - fraction, 3);
        const pct = fromPct + eased * (progressTarget - fromPct);
        if (pct > progressCurrent) progressCurrent = pct;
        progressFill.style.width = progressCurrent + '%';
        if (fraction < 1) progressAnimFrame = requestAnimationFrame(animate);
      }
      progressAnimFrame = requestAnimationFrame(animate);
    }

    function onServerProgress(pct) {
      if (pct > progressCurrent) {
        progressCurrent = pct;
        progressFill.style.width = pct + '%';
      }
    }

    function completeProgress() {
      if (progressAnimFrame) { cancelAnimationFrame(progressAnimFrame); progressAnimFrame = null; }
      progressFill.style.transition = 'width 0.3s ease';
      progressFill.style.width = '100%';
      progressBar.classList.add('done');
      setTimeout(() => {
        progressFill.style.width = '0%';
        progressBar.classList.remove('done');
        setTimeout(() => { progressFill.style.transition = 'none'; }, 300);
      }, 800);
    }

    function resetProgress() {
      if (progressAnimFrame) { cancelAnimationFrame(progressAnimFrame); progressAnimFrame = null; }
      progressFill.style.transition = 'width 0.3s ease';
      progressFill.style.width = '0%';
      progressBar.classList.remove('done');
      setTimeout(() => { progressFill.style.transition = 'none'; }, 300);
    }

    // --- Recording timer ---
    function startRecTimer() {
      recStartTime = Date.now();
      recTimerEl.textContent = '0:00';
      recTimerEl.classList.remove('warning');
      recTimerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - recStartTime) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        recTimerEl.textContent = mins + ':' + String(secs).padStart(2, '0');
        // Soft warning at 2 minutes
        if (elapsed >= 120 && !recTimerEl.classList.contains('warning')) {
          recTimerEl.classList.add('warning');
          showToast('Long recording \u2014 longer audio takes longer to process', 'hint');
        }
      }, 1000);
    }

    function stopRecTimer() {
      if (recTimerInterval) clearInterval(recTimerInterval);
      recTimerInterval = null;
      recTimerEl.textContent = '';
      recTimerEl.classList.remove('warning');
    }

    // --- WebSocket ---
    function connect() {
      const host = window.location.host;
      const wsUrl = 'wss://' + host + '/ws';

      setStatus('connecting', 'Connecting to desktop...');
      micBtn.classList.add('disabled');

      ws = new WebSocket(wsUrl);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        setStatus('connected', 'Connected to desktop');
        // Re-check GPU availability on every (re)connect — the user may
        // have toggled Free GPU or restarted the desktop app since our
        // last fetch, and live mode's availability needs to reflect that.
        if (typeof refreshDesktopGpuStatus === 'function') {
          refreshDesktopGpuStatus();
        }
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type === 'status') {
          if (msg.state === 'ready') {
            setStatus('connected', 'Ready — tap the mic');
            micBtn.classList.remove('disabled');
            micHint.textContent = 'Tap to start recording';
          } else if (msg.state === 'loading') {
            setStatus('connecting', 'Desktop loading model...');
          } else if (msg.state === 'transcribing') {
            setStatus('transcribing', 'Transcribing...');
            micHint.textContent = 'Processing your speech...';
            startAnimatedProgress(lastAudioDurationSec);
          }
        } else if (msg.type === 'result') {
          completeProgress();
          transcript.textContent = msg.text;
          transcript.classList.remove('empty');
          transcript.classList.add('success');
          setTimeout(() => transcript.classList.remove('success'), 2000);

          if (msg.injected) {
            micHint.textContent = 'Inserted! Tap to record again';
          } else {
            micHint.textContent = 'Transcribed (injection failed). Tap to try again';
          }
          setStatus('connected', 'Ready — tap the mic');
          micBtn.classList.remove('disabled');
        } else if (msg.type === 'hint') {
          resetProgress();
          showToast(msg.message, 'hint');
          setStatus('connected', 'Ready — tap the mic');
          micBtn.classList.remove('disabled');
          micHint.textContent = 'Tap to try again';
        } else if (msg.type === 'error') {
          resetProgress();
          showToast(msg.message, 'error');
          setStatus('connected', 'Ready — tap the mic');
          micBtn.classList.remove('disabled');
          micHint.textContent = 'Tap to try again';
        } else if (msg.type === 'progress') {
          onServerProgress(msg.percent);
        } else if (msg.type === 'setting' && msg.key === 'auto_space') {
          if (msg.value) {
            autoSpaceToggle.classList.add('on');
          } else {
            autoSpaceToggle.classList.remove('on');
          }
        } else if (msg.type === 'setting' && msg.key === 'auto_format') {
          if (msg.value) {
            autoFormatToggle.classList.add('on');
            autoFormatExtra.style.display = '';
          } else {
            autoFormatToggle.classList.remove('on');
            autoFormatExtra.style.display = 'none';
          }
        } else if (msg.type === 'setting' && msg.key === 'auto_format_type') {
          autoFormatType.value = msg.value;
        } else if (msg.type === 'status' && msg.state === 'formatting') {
          setStatus('transcribing', 'AI formatting...');
          micHint.textContent = 'Formatting with AI...';
          startFormattingProgress();
        } else if (msg.type === 'setting' && msg.key === 'has_llm_model') {
          if (!msg.value) {
            // No model — trigger download
            showToast('Downloading AI model (first time only)...', 'hint');
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ type: 'download_model' }));
            }
          }
        } else if (msg.type === 'download_progress') {
          micHint.textContent = 'Downloading AI model... ' + msg.percent + '%';
        } else if (msg.type === 'download_status') {
          if (msg.state === 'complete') {
            showToast('AI model ready!', 'hint');
            micHint.textContent = 'Tap to start recording';
          } else if (msg.state === 'failed') {
            showToast('Model download failed', 'error');
          }
        } else if (msg.type === 'live_status') {
          if (msg.state === 'listening') {
            setStatus('listening', 'Live — listening');
            micHint.textContent = 'Speak naturally. Tap again to stop.';
          } else if (msg.state === 'formatting') {
            setStatus('transcribing', 'AI formatting dictation...');
            micHint.textContent = 'Formatting with AI...';
            startFormattingProgress();
          }
        } else if (msg.type === 'live_segment') {
          // Append to running transcript. Each segment is one VAD
          // utterance; joining with " " matches how the server assembles
          // the final text for LLM formatting.
          liveSegments.push(msg.text);
          transcript.textContent = liveSegments.join(' ');
          transcript.classList.remove('empty');
          transcript.classList.add('live');
          transcript.scrollTop = transcript.scrollHeight;
        } else if (msg.type === 'live_ended') {
          completeProgress();
          liveAwaitingEnd = false;
          liveActive = false;
          micBtn.classList.remove('recording');
          micBtn.classList.remove('disabled');
          if (msg.formatted && msg.text) {
            // Formatted mode: show the polished version on the phone
            // instead of the raw running transcript so the user sees
            // what actually got injected at the cursor.
            transcript.textContent = msg.text;
            transcript.classList.add('success');
            setTimeout(() => transcript.classList.remove('success'), 2000);
          }
          setTimeout(() => transcript.classList.remove('live'), 1500);
          setStatus('connected', 'Ready — tap the mic');
          micHint.textContent = 'Tap to start recording';
          stopRecTimer();
        }
      };

      ws.onclose = () => {
        setStatus('error', 'Disconnected');
        micBtn.classList.add('disabled');
        micHint.textContent = 'Connection lost. Reconnecting...';
        // Clean up any in-flight live session so we don't get stuck.
        if (liveActive || liveAwaitingEnd) {
          closeMic();
          liveActive = false;
          liveAwaitingEnd = false;
          isRecording = false;
          micBtn.classList.remove('recording');
          transcript.classList.remove('live');
          stopRecTimer();
        }
        setTimeout(connect, 2000);
      };

      ws.onerror = () => {
        ws.close();
      };
    }

    // --- Status ---
    function setStatus(state, text) {
      statusDot.className = 'status-dot ' + state;
      statusText.textContent = text;
    }

    function showToast(msg, type) {
      toastMsg.textContent = msg;
      toastMsg.className = 'toast ' + type + ' visible';
      setTimeout(() => toastMsg.classList.remove('visible'), 3000);
    }

    // --- Audio capture ---
    // Shared helper: open the mic and create a ScriptProcessorNode.
    // Returns { source, recorder } for the caller to wire up.
    async function openMic() {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          sampleRate: 16000,
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
        }
      });

      audioContext = new (window.AudioContext || window.webkitAudioContext)({
        sampleRate: 16000
      });

      const source = audioContext.createMediaStreamSource(mediaStream);
      recorder = audioContext.createScriptProcessor(4096, 1, 1);
      source.connect(recorder);
      recorder.connect(audioContext.destination);
      return { source, recorder };
    }

    // Shared helper: tear down mic + AudioContext.
    function closeMic() {
      if (recorder) { recorder.disconnect(); recorder = null; }
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
      if (audioContext) { audioContext.close(); audioContext = null; }
    }

    // --- Press-to-talk recording ---
    async function startRecording() {
      try {
        await openMic();
        recordedSamples = [];

        recorder.onaudioprocess = (e) => {
          const data = e.inputBuffer.getChannelData(0);
          recordedSamples.push(new Float32Array(data));
        };

        isRecording = true;
        micBtn.classList.add('recording');
        micHint.textContent = 'Recording... tap to stop';
        setStatus('recording', 'Recording...');
        startRecTimer();
      } catch (err) {
        showToast('Microphone access denied. Please allow microphone access.', 'error');
      }
    }

    function stopRecording() {
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.classList.add('disabled');
      micHint.textContent = 'Sending audio...';
      stopRecTimer();

      closeMic();

      // Merge all recorded chunks into a single Float32Array
      let totalLength = 0;
      for (const chunk of recordedSamples) totalLength += chunk.length;
      lastAudioDurationSec = totalLength / 16000;

      const merged = new Float32Array(totalLength);
      let offset = 0;
      for (const chunk of recordedSamples) {
        merged.set(chunk, offset);
        offset += chunk.length;
      }

      // Send as binary (raw f32 little-endian bytes)
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(merged.buffer);
      } else {
        showToast('Not connected to desktop', 'error');
        micBtn.classList.remove('disabled');
        micHint.textContent = 'Tap to try again';
      }

      recordedSamples = [];
    }

    // --- Live-mode streaming ---
    // Each onaudioprocess fires ~256 ms of f32 samples at 16 kHz.
    // We send each chunk immediately as a binary WebSocket frame;
    // the server feeds it to the Silero VAD, which handles
    // endpointing and routes completed utterances to Whisper.
    async function startLiveSession() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        showToast('Not connected to desktop', 'error');
        return;
      }

      try {
        await openMic();
      } catch (err) {
        showToast('Microphone access denied. Please allow microphone access.', 'error');
        return;
      }

      // Signal the server to spin up a LiveSessionHandle.
      ws.send(JSON.stringify({ type: 'live_start' }));

      liveSegments = [];
      liveActive = true;
      liveAwaitingEnd = false;
      isRecording = true;
      micBtn.classList.add('recording');
      transcript.textContent = 'Listening...';
      transcript.classList.remove('empty', 'success');
      transcript.classList.add('live');
      startRecTimer();

      // Stream each audio buffer as it arrives.
      recorder.onaudioprocess = (e) => {
        if (!liveActive || !ws || ws.readyState !== WebSocket.OPEN) return;
        const data = e.inputBuffer.getChannelData(0);
        // Send raw f32 LE bytes (same format as press-to-talk).
        ws.send(new Float32Array(data).buffer);
      };
    }

    function stopLiveSession() {
      isRecording = false;
      liveAwaitingEnd = true;
      micBtn.classList.add('disabled');
      micHint.textContent = 'Finishing up...';

      closeMic();

      // Tell the server to flush the VAD + drain Whisper queue.
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'live_stop' }));
      }
      // Don't reset liveActive yet — we wait for live_ended from the
      // server so any in-flight segments + the LLM pass complete first.
    }

    // --- Mic button ---
    micBtn.addEventListener('click', () => {
      if (micBtn.classList.contains('disabled')) return;

      if (isLiveModeOn()) {
        // Live mode: toggle start/stop of continuous streaming session.
        if (!liveActive) {
          startLiveSession();
        } else {
          stopLiveSession();
        }
      } else {
        // Press-to-talk: existing behavior.
        if (!isRecording) {
          startRecording();
        } else {
          stopRecording();
        }
      }
    });

    // --- Key buttons ---
    function sendKey(key) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'key', key }));
      }
    }

    document.getElementById('enterBtn').addEventListener('click', () => sendKey('enter'));
    document.getElementById('tabBtn').addEventListener('click', () => sendKey('tab'));
    document.getElementById('backspaceBtn').addEventListener('click', () => sendKey('backspace'));
    document.getElementById('readAloudBtn').addEventListener('click', () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'read_aloud' }));
      }
    });

    // --- Auto-space toggle ---
    const autoSpaceToggle = document.getElementById('autoSpaceToggle');

    autoSpaceToggle.addEventListener('click', () => {
      const isOn = autoSpaceToggle.classList.toggle('on');
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'set_auto_space', enabled: isOn }));
      }
    });

    // --- Live mode toggle ---
    // Continuous streaming is GPU-bound: the desktop has to run Whisper on
    // every utterance in near-real-time, plus (if auto-format is on) the LLM
    // pass after each one. On a CPU-only desktop this falls apart — a second
    // of speech can take several seconds to transcribe, segments pile up
    // behind each other, and the UI misleads the user into thinking the
    // feature is broken. Rather than ship that bad experience, we disable
    // the toggle when the desktop reports no GPU.
    const liveModeToggle = document.getElementById('liveModeToggle');
    const liveModeHint = document.getElementById('liveModeHint');
    let desktopHasGpu = null; // null = unknown, true/false once /api/info responds

    function applyLiveModeAvailability() {
      if (desktopHasGpu === false) {
        // Force off + visually disable
        if (liveActive || isRecording) return; // don't yank mid-session
        liveModeToggle.classList.remove('on');
        liveMode = false;
        liveModeToggle.classList.add('disabled');
        liveModeHint.textContent = 'Unavailable: the desktop is running on CPU. Live mode needs GPU acceleration to keep up.';
      } else {
        liveModeToggle.classList.remove('disabled');
        liveModeHint.textContent = 'Streams audio continuously; auto-splits on pauses. Beta — quality varies.';
      }
    }

    async function refreshDesktopGpuStatus() {
      try {
        const resp = await fetch('/api/info', { cache: 'no-store' });
        const data = await resp.json();
        // `data.gpu` is null while the Whisper model is still loading;
        // treat that as unknown (don't disable yet) and retry shortly.
        if (data.gpu === null || data.gpu === undefined) {
          desktopHasGpu = null;
          setTimeout(refreshDesktopGpuStatus, 2000);
        } else {
          desktopHasGpu = Boolean(data.gpu);
        }
      } catch (_) {
        // Best effort — if the endpoint isn't reachable we just leave
        // the toggle enabled rather than lock users out on a network blip.
        desktopHasGpu = null;
      }
      applyLiveModeAvailability();
    }

    liveModeToggle.addEventListener('click', () => {
      // Don't allow toggling mid-session — that would be confusing.
      if (liveActive || isRecording) return;
      // GPU gate: silently ignore clicks when unavailable.
      if (desktopHasGpu === false) {
        showToast('Live mode needs GPU on the desktop', 'error');
        return;
      }
      liveModeToggle.classList.toggle('on');
      liveMode = isLiveModeOn();
      micHint.textContent = liveMode
        ? 'Tap to start live dictation'
        : 'Tap to start recording';
    });

    // Initial check, plus re-check any time the WebSocket reconnects.
    refreshDesktopGpuStatus();

    // --- Auto-format toggle ---
    const autoFormatToggle = document.getElementById('autoFormatToggle');
    const autoFormatExtra = document.getElementById('autoFormatExtra');
    const autoFormatType = document.getElementById('autoFormatType');

    autoFormatToggle.addEventListener('click', () => {
      const isOn = autoFormatToggle.classList.toggle('on');
      autoFormatExtra.style.display = isOn ? '' : 'none';
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'set_auto_format', enabled: isOn }));
        if (isOn) {
          ws.send(JSON.stringify({ type: 'check_llm_model' }));
        }
      }
    });

    autoFormatType.addEventListener('change', () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'set_auto_format_type', value: autoFormatType.value }));
      }
    });

    // --- Keep alive ---
    setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'ping' }));
      }
    }, 15000);

    // --- Go ---
    connect();
  </script>
</body>
</html>
